# ============================================================
# EVE Structure Monitor Bot - Configuration
# ============================================================
# All secrets should be set as environment variables in Railway.
# You can also use a .env file locally for testing (never commit it!).

# --- Discord Settings ---
# Your Discord bot token (from Discord Developer Portal)
discord.bot.token=${DISCORD_BOT_TOKEN}

# The Discord channel ID where attack alerts will be sent
discord.alert.channel.id=${DISCORD_ALERT_CHANNEL_ID}

# The Discord role ID to @ mention when an attack happens (e.g., @StructureAlert)
discord.alert.role.id=${DISCORD_ALERT_ROLE_ID}

# --- EVE ESI OAuth Settings ---
# These come from https://developers.eveonline.com/
eve.esi.client.id=${EVE_CLIENT_ID}
eve.esi.client.secret=${EVE_CLIENT_SECRET}

# The refresh token obtained after the director logs in with ESI OAuth
# This never expires as long as you keep refreshing it
eve.esi.refresh.token=${EVE_REFRESH_TOKEN}

# The EVE corporation ID to monitor (numeric ID, find it on zkillboard or ESI)
eve.corporation.id=${EVE_CORPORATION_ID}

# The full public URL of this app + /auth/callback
# On Railway this will be: https://your-app-name.railway.app/auth/callback
# ⚠ This MUST also be set as the Callback URL in your EVE Developer Application!
eve.esi.callback.url=${EVE_ESI_CALLBACK_URL}

# --- ESI API Base URL (don't change this) ---
eve.esi.base.url=https://esi.evetech.net/latest

# --- Polling interval in milliseconds ---
# 300000 = 5 minutes. Don't go below 60000 (1 min) or ESI may rate-limit you.
monitor.poll.interval.ms=${POLL_INTERVAL_MS:300000}

# --- Spring Server ---
# Railway assigns a PORT environment variable automatically
server.port=${PORT:8080}

# --- Logging ---
logging.level.com.evebot=INFO
logging.level.root=WARN
